<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Book</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Recipe Book">
  <meta property="og:description" content="Find delicious recipes and cooking inspiration.">
  <meta property="og:url" content="https://your-site-url.com">
  <meta property="og:image" content="images/social-preview-image.png">

  <!-- X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Recipe Book">
  <meta name="twitter:description" content="Find delicious recipes and cooking inspiration.">
  <meta name="twitter:image" content="images/social-preview-image.png">

  <!-- Icons -->
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <link rel="stylesheet" href="recipes.css">
</head>
<body>
  <header>
    <div class="logo-title">
      <img src="images/recipe-book.png" alt="Recipe Book logo" class="logo">
      <h1>Recipe Book</h1>
    </div>
  </header>

  <main>
    <section class="search-section">
      <form class="search-bar" action="#" method="get">
        <input type="text" placeholder="Search recipes..." aria-label="Search recipes">
        <button type="submit">
          <img src="images/search.svg" alt="Search icon">
        </button>
      </form>
    </section>

    <section class="recipe-card">
      <img src="images/apple-crisp.jpg" alt="Apple crisp in a baking dish" class="recipe-image">

      <div class="recipe-content">
        <p class="tag">Dessert</p>
        <h2>Apple Crisp</h2>

        <span
          class="rating"
          role="img"
          aria-label="Rating: 4 out of 5 stars"
        >
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star-empty">☆</span>
        </span>

        <p class="description">
          This easy apple crisp is full of warm cinnamon apples and a buttery oat topping.
          It is the perfect dessert for fall evenings, family dinners, or whenever you want
          something simple and comforting.
        </p>
      </div>
    </section>
  </main>

  <footer>
    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
      Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">
      <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
      <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
      <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
      <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>
  </footer>
</body>
</html>
